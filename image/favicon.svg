<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<defs>
		<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#1c1914"/>
			<stop offset="100%" stop-color="#0a0908"/>
		</linearGradient>
		<linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#d4794a"/>
			<stop offset="100%" stop-color="#e9e1d2"/>
		</linearGradient>
	</defs>

	<circle cx="32" cy="32" r="31" fill="url(#bg)"/>
	<circle cx="32" cy="32" r="30" fill="none" stroke="rgba(212,121,74,0.25)" stroke-width="1"/>

	<!-- a single flowing ink stroke, evoking handwriting without spelling out
	     a literal letterform -->
	<path d="M16 38 C 22 22, 28 46, 34 30 S 44 18, 48 34"
		stroke="url(#ink)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
</svg>
