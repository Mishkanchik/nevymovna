<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./image/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="./image/favicon-64.png" type="image/png" sizes="64x64">
    <title>nevymovna</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500..700&family=Manrope:wght@300..800&display=swap"
        rel="stylesheet">
</head>

<body>

    <canvas id="bg-canvas"></canvas>

    <main class="stage">

        <header class="mark">nevymovna</header>

        <section class="card" id="card">

            <div class="card-decor-clip" aria-hidden="true">
                <svg class="ink-trace" viewBox="0 0 460 90" preserveAspectRatio="none">
                    <path class="ink-trace__path" d="M10 55 C 50 20, 90 75, 130 40 S 200 15, 230 50
                        270 80, 310 35 S 380 20, 410 55 430 70, 450 50" />
                </svg>
            </div>

            <div class="portrait">
                <img src="./image/nevymovna.jpg" alt="nevymovna">
            </div>

            <p class="eyebrow">слова, що не вміщаються в голос</p>
            <h1 class="wordmark">nevymovna</h1>

            <div class="rule"><span>знайти тут</span></div>

            <nav class="links">

                <div class="link telegram" data-key="telegram" data-label="Telegram" tabindex="0">
                    <span class="link-icon"></span>
                    <ul class="menu">
                        <li><a rel="nofollow" target="_blank" title="Telegram nevymovna"
                                onclick="fbq('track', 'Contact');" href="https://t.me/nevymovna">
                                <span class="menu-title">nevymovna</span>
                                <span class="menu-sub">основний канал</span>
                            </a></li>
                        <li><a rel="nofollow" target="_blank" title="Telegram nevymovnaa"
                                onclick="fbq('track', 'Contact');" href="https://t.me/nevymovnaa">
                                <span class="menu-title">тексти / акорди</span>
                                <span class="menu-sub">слова й музика</span>
                            </a></li>
                        <li><a rel="nofollow" target="_blank" title="Telegram mindless poetry"
                                onclick="fbq('track', 'Contact');" href="https://t.me/vaxhhkmupoetry">
                                <span class="menu-title">mindless poetry</span>
                                <span class="menu-sub">вірші без фільтру</span>
                            </a></li>
                    </ul>
                </div>

                <a class="link-bare" rel="nofollow" target="_blank" title="Instagram" onclick="fbq('track', 'Contact');"
                    href="https://www.instagram.com/vaxhhkmu?igsh=MXgybDFsMDBzcW8wMQ==">
                    <div class="link" data-key="instagram" data-label="Instagram">
                        <span class="link-icon"></span>
                    </div>
                </a>

                <a class="link-bare" rel="nofollow" target="_blank" title="Youtube Music"
                    onclick="fbq('track', 'Contact');" href="https://music.youtube.com/watch?v=cGExBuOWM8w">
                    <div class="link" data-key="youtubeMusic" data-label="YouTube Music">
                        <span class="link-icon"></span>
                    </div>
                </a>

                <div class="link tiktok" data-key="tiktok" data-label="TikTok" tabindex="0">
                    <span class="link-icon"></span>
                    <ul class="menu">
                        <li><a rel="nofollow" target="_blank" title="TikTok nevymovna"
                                onclick="fbq('track', 'Contact');" href="https://www.tiktok.com/@nevymovna">
                                <span class="menu-title">nevymovna</span>
                                <span class="menu-sub">основний акаунт</span>
                            </a></li>
                        <li><a rel="nofollow" target="_blank" title="TikTok невимовна музика"
                                onclick="fbq('track', 'Contact');" href="https://www.tiktok.com/@vaxmiard">
                                <span class="menu-title">Дрю</span>
                                <span class="menu-sub">за кадром</span>
                            </a></li>
                    </ul>
                </div>

            </nav>

            <div class="button_transition"></div>

            <p class="footer-note">nevymovna · з морозом у грудях</p>

        </section>

    </main>

    <script type="module" src="./script.js"></script>
